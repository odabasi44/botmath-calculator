name: scientific_calculator
description: A professional scientific calculator app built with Flutter.
publish_to: 'none'
version: 1.0.38+50

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  math_expressions: ^2.5.0
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  http: ^1.1.0
  url_launcher: ^6.3.1
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1
  google_mobile_ads: ^5.2.0
  image_cropper: ^8.0.2
  share_plus: ^7.2.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_analytics: ^11.4.1
  firebase_remote_config: ^5.1.1
  cloud_functions: ^5.2.1
  package_info_plus: ^8.1.2
  facebook_app_events: ^0.27.2
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.3
  app_tracking_transparency: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  ios: true
  image_path: "assets/logo/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/logo/icon.png"
  android: true
  ios: true
